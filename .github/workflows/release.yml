name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0-draft'

jobs:
  release:
    name: Build and Release App
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Framework-Dependent (win-x64)
      run: |
        dotnet publish Artnet.csproj -c Release -r win-x64 --self-contained false -o publish/win-x64-dependent

    - name: Publish Self-Contained Single-File (win-x64)
      run: |
        dotnet publish Artnet.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o publish/win-x64-self-contained

    - name: Create ZIP Archives
      shell: pwsh
      run: |
        Compress-Archive -Path publish/win-x64-dependent/* -DestinationPath Artnet-win-x64-dependent.zip
        Compress-Archive -Path publish/win-x64-self-contained/* -DestinationPath Artnet-win-x64-self-contained.zip

    - name: Determine Release Tag
      id: get_tag
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_tag.outputs.tag }}
        name: Release ${{ steps.get_tag.outputs.tag }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          Artnet-win-x64-dependent.zip
          Artnet-win-x64-self-contained.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
