name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run xUnit tests
      run: dotnet test --configuration Release --no-restore --verbosity normal

    - name: Create ZIP Archive
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: pwsh
      run: |
        dotnet publish Artnet.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o publish/win-x64-self-contained
        Compress-Archive -Path publish/win-x64-self-contained/* -DestinationPath Artnet-win-x64-self-contained.zip

    - name: Bump version and push
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      id: bump_version
      shell: bash
      run: |
        VERSION=$(cat VERSION)
        echo "Current version: $VERSION"
        
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        PATCH=$((PATCH + 1))
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        echo "New version: $NEW_VERSION"
        
        echo "$NEW_VERSION" > VERSION
        
        echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add VERSION
        git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
        git push origin HEAD:main

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.bump_version.outputs.tag }}
        name: Release ${{ steps.bump_version.outputs.tag }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          Artnet-win-x64-self-contained.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
